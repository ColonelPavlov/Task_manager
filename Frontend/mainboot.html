<!DOCTYPE html>
<html>
<head>
  <title>MURKOFF | Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      background-image: url('Murkoff.jpg');  
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }
    .bg-murkoff-dark {
      background-color: rgba(0, 0, 0, 0.6) !important;
      backdrop-filter: blur(5px);
      color: #80b670;
    }
    .bg-murkoff-light {
      background-color: rgba(0,0,0,0.5) !important;
      backdrop-filter: blur(5px);
    }
    .kanban-column {
      min-width: 320px;
      transition: background-color 0.2s;
    }
    .kanban-column.drag-over {
      background-color: rgba(74, 103, 65, 0.7) !important;
      border: 2px dashed #4a6741;
    }
    .task-card {
      cursor: grab;
      transition: transform 0.2s, box-shadow 0.2s;
      border-left: 4px solid #4a6741;
    }
    .task-card:active { cursor: grabbing; }
    .task-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .priority-high { background-color: #f44336; color: white; }
    .priority-medium { background-color: #ff9800; color: white; }
    .priority-low { background-color: #4caf50; color: white; }
    .tag-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }
    .tag-item.selected {
      outline: 2px solid white;
    }
    .remove-tag {
      background: rgba(0,0,0,0.3);
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .project-item {
      cursor: pointer;
      transition: 0.2s;
    }
    .project-item:hover {
      background-color: #4a6741 !important;
    }
    .nav-tab {
      cursor: pointer;
      transition: 0.2s;
    }
    .nav-tab:hover {
      background-color: #4a6741;
    }
    .task-card.dragging {
      opacity: 0.4;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top" style="background-color: #3a5232;">
  <div class="container-fluid px-4">
    <a class="navbar-brand text-white fw-bold fs-3" href="#">MURKOFF TASKS</a>
    <div class="d-flex gap-3 align-items-center">
      <div class="nav-tab text-white px-3 py-2 rounded-pill active" data-tab="kanban">Канбан</div>
      <div class="nav-tab text-white px-3 py-2 rounded-pill" data-tab="analytics" id="analyticsTabBtn">Аналитика</div>
      <div class="nav-tab text-white px-3 py-2 rounded-pill" data-tab="profile">Профиль</div>
      <span class="badge bg-warning text-dark px-3 py-2 rounded-pill" id="userRoleBadge"></span>
      <button class="btn btn-danger rounded-pill px-4" id="logoutBtn">Выйти</button>
    </div>
  </div>
</nav>

<!-- Страница канбана -->
<div id="kanbanPage">
  <div class="container-fluid pt-5 mt-4">
    <div class="row">
      <div class="col-md-3 col-lg-2 mb-4">
        <div class="bg-murkoff-dark rounded-4 p-3 sticky-top" style="top: 80px;">
          <h5 class="text-white mb-3">📁 Проекты</h5>
          <div id="projectList"></div>
          <div class="input-group mt-3">
            <input type="text" id="newProjectName" class="form-control form-control-sm rounded-pill" placeholder="Новый проект...">
            <button class="btn btn-success btn-sm rounded-pill px-3" onclick="addProject()">➕</button>
          </div>
          <hr class="bg-secondary">
          <h5 class="text-white mb-3">🏷️ Все теги</h5>
          <div id="allTagsList" class="d-flex flex-wrap gap-2"></div>
        </div>
      </div>
      <div class="col-md-9 col-lg-10">
        <div class="bg-murkoff-light rounded-4 p-3 mb-3 d-flex justify-content-between align-items-center">
          <h3 class="text-white mb-0" id="currentProjectTitle">📋 Все задачи</h3>
          <button class="btn btn-success rounded-pill px-4" onclick="showAddTask()">+ Новая задача</button>
        </div>
        <div class="d-flex gap-3 overflow-auto pb-3" id="kanbanBoard" style="min-height: 70vh;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Страница профиля -->
<div id="profilePage" style="display: none;">
  <div class="container pt-5 mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="bg-murkoff-dark rounded-4 p-5 text-center text-white">
          <h2>👤 Агент</h2>
          <p class="mt-3">Логин: <strong id="profileUser"></strong></p>
          <p>Роль: <strong id="profileRole"></strong></p>
          <hr class="bg-secondary">
          <h4>📊 Статистика агента</h4>
          <p id="profileStats"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Страница аналитики -->
<div id="analyticsPage" style="display: none;">
  <div class="container pt-5 mt-5">
    <div class="row justify-content-center">
      <div class="col-md-10">
        <div class="bg-murkoff-dark rounded-4 p-4 text-white">
          <h2 class="text-center mb-4">📊 Аналитическая панель корпорации Murkoff</h2>
          <div class="row">
            <div class="col-md-6 mb-4">
              <div class="bg-dark rounded-3 p-3 text-center" style="border: 1px solid #4a6741;">
                <h5 class="mb-3" style="color: #4a6741;">Затрачено часов сотрудниками</h5>
                <canvas id="hoursChart" style="max-height: 280px;"></canvas>
              </div>
            </div>
            <div class="col-md-6 mb-4">
              <div class="bg-dark rounded-3 p-3 text-center d-flex flex-column align-items-center" style="border: 1px solid #4a6741;">
                <h5 class="mb-3" style="color: #4a6741;">Распределение задач по статусам</h5>
                <canvas id="statusesChart" style="max-height: 250px; max-width: 250px;"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Модалка задачи -->
<div class="modal fade" id="taskModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background-color: #e8f0e6;">
      <div class="modal-body p-4">
        <h3 id="taskModalTitle" class="mb-3" style="color: #3a5232;">➕ Новая задача</h3>
        <input type="text" id="taskTitle" class="form-control rounded-pill mb-3" placeholder="Название задачи">
        <textarea id="taskDescription" class="form-control mb-3" rows="3" placeholder="Описание задачи..."></textarea>
        <input type="datetime-local" id="taskDeadline" class="form-control rounded-pill mb-3">
        <select id="taskPriority" class="form-select rounded-pill mb-3">
          <option value="low">🟢 Низкий</option>
          <option value="medium">🟠 Средний</option>
          <option value="high">🔴 Высокий</option>
        </select>
        <select id="taskProject" class="form-select rounded-pill mb-3">
          <option value="">Без проекта</option>
        </select>
        <label class="fw-bold mb-2">🏷️ Теги:</label>
        <div id="modalTagsList" class="d-flex flex-wrap gap-2 mb-3"></div>
        <label class="fw-bold mb-2">➕ Новый тег:</label>
        <div class="input-group mb-3">
          <input type="text" id="newTagName" class="form-control rounded-pill" placeholder="Название">
          <input type="color" id="newTagColor" class="form-control form-control-color rounded-pill" style="width: 50px;" value="#4a6741">
          <button class="btn btn-success rounded-pill" onclick="addNewTagFromModal()">Добавить</button>
        </div>
        <div class="d-flex gap-3 mt-4">
          <button class="btn btn-secondary rounded-pill flex-fill" data-bs-dismiss="modal">Отмена</button>
          <button class="btn" style="background-color: #4a6741; color: white; border-radius: 50px; flex: 1;" onclick="saveTask()">Сохранить</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ======================== КОНФИГУРАЦИЯ ========================
const API_BASE_URL = 'http://localhost:8000/api';
const FLASK_BASE_URL = 'http://localhost:5001/api/v1/supporting';

// Глобальные переменные
let authToken = localStorage.getItem('authToken');
let agent = localStorage.getItem('agent');
let tasks = [];
let projects = [];        // [{project_id, name}]
let allTags = [];         // [{tag_id, name, color}]
let currentProjectId = null;
let editingTaskId = null;
let chosenTagId = null;
let dragId = null;
let taskModal;
let hoursChart, statusesChart;

const STATUSES = ['todo', 'in_progress', 'done', 'on_hold'];
const STATUS_NAMES = {
  'todo': '📋 Нужно сделать',
  'in_progress': '⚙️ В процессе',
  'done': '✅ Готово',
  'on_hold': '⏸️ Отложено'
};

// ======================== АВТОРИЗАЦИЯ ========================
// Перехват токена из URL (при переходе с logboot.html)
const urlParams = new URLSearchParams(window.location.search);
const urlToken = urlParams.get('access_token');
const urlAgent = urlParams.get('agent');
if (urlToken) localStorage.setItem('authToken', urlToken);
if (urlAgent) localStorage.setItem('agent', urlAgent);
authToken = localStorage.getItem('authToken');
agent = localStorage.getItem('agent');

if (!authToken || !agent) {
  window.location.href = 'logboot.html';
}

// ======================== API HELPER ========================
async function apiRequest(endpoint, method = 'GET', body = null) {
  const token = localStorage.getItem('authToken');
  if (!token) throw new Error('Нет токена');
  const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  const options = { method, headers };
  if (body) options.body = JSON.stringify(body);
  const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
  if (response.status === 401) {
    localStorage.removeItem('authToken');
    localStorage.removeItem('agent');
    window.location.href = 'logboot.html';
    throw new Error('Сессия истекла');
  }
  const data = await response.json();
  if (!response.ok) throw new Error(data.detail || data.message || 'Ошибка запроса');
  return data;
}

// ======================== ЗАГРУЗКА ВСЕХ ДАННЫХ ========================
async function loadData() {
  try {
    // 1. Задачи
    const tasksData = await apiRequest('/tasks', 'GET');
    tasks = tasksData.tasks || [];

    // 2. Проекты
    const projectsData = await apiRequest('/projects', 'GET');
    projects = projectsData.projects || [];

    // 3. Теги
    const tagsData = await apiRequest('/tags', 'GET');
    allTags = (tagsData.tags || []).map(t => ({ tag_id: t.id, name: t.name, color: t.color }));

    // 4. Роль пользователя (точечный запрос)
    const userData = await apiRequest(`/users/${encodeURIComponent(agent)}`, 'GET');
    const role = userData.role === 'admin' ? 'admin' : 'user';
    document.getElementById('userRoleBadge').textContent = role === 'admin' ? '👑 Администратор' : '👤 Пользователь';
    document.getElementById('profileRole').textContent = role === 'admin' ? 'Администратор' : 'Пользователь';

    // Отрисовка UI
    renderProjects();
    renderAllTags();
    renderKanban();
    updateProjectSelect();
    refreshStats();
  } catch (error) {
    console.error('loadData error:', error);
    alert('Ошибка загрузки данных: ' + error.message);
  }
}

// ======================== ПРОЕКТЫ ========================
function renderProjects() {
  const container = document.getElementById('projectList');
  if (!container) return;
  let html = `<div class="project-item p-2 rounded mb-1 ${currentProjectId === null ? 'bg-success' : 'bg-secondary bg-opacity-25'}" onclick="selectProject(null)">📋 Все задачи</div>`;
  for (let p of projects) {
    html += `<div class="project-item p-2 rounded mb-1 d-flex justify-content-between align-items-center ${currentProjectId === p.project_id ? 'bg-success' : 'bg-secondary bg-opacity-25'}" onclick="selectProject(${p.project_id})">
      <span>📁 ${escapeHtml(p.name)}</span>
      <button class="btn btn-sm btn-danger rounded-pill" onclick="event.stopPropagation(); deleteProject(${p.project_id})">🗑️</button>
    </div>`;
  }
  container.innerHTML = html;
}

function selectProject(projectId) {
  currentProjectId = projectId;
  const project = projects.find(p => p.project_id === projectId);
  document.getElementById('currentProjectTitle').innerHTML = projectId ? `📁 ${escapeHtml(project.name)}` : '📋 Все задачи';
  renderProjects();
  renderKanban();
}

async function addProject() {
  const input = document.getElementById('newProjectName');
  const name = input.value.trim();
  if (!name) { alert('Введите название проекта!'); return; }
  try {
    const result = await apiRequest('/projects', 'POST', { name });
    const newProject = { project_id: result.project_id, name: name };
    projects.push(newProject);
    renderProjects();
    updateProjectSelect();
    input.value = '';
  } catch (err) {
    alert('Ошибка создания проекта: ' + err.message);
  }
}

async function deleteProject(projectId) {
  const project = projects.find(p => p.project_id === projectId);
  if (!project) return;
  if (!confirm(`Удалить проект "${project.name}"? Все задачи останутся без проекта.`)) return;
  try {
    await apiRequest(`/projects/${encodeURIComponent(project.name)}`, 'DELETE');
    projects = projects.filter(p => p.project_id !== projectId);
    if (currentProjectId === projectId) currentProjectId = null;
    // Перезагружаем задачи, чтобы БД обнулила project_id (ON DELETE SET NULL)
    const tasksData = await apiRequest('/tasks', 'GET');
    tasks = tasksData.tasks || [];
    renderProjects();
    updateProjectSelect();
    renderKanban();
  } catch (err) {
    alert('Ошибка удаления проекта: ' + err.message);
  }
}

function updateProjectSelect() {
  const select = document.getElementById('taskProject');
  if (!select) return;
  let options = '<option value="">Без проекта</option>';
  for (let p of projects) options += `<option value="${p.project_id}">${escapeHtml(p.name)}</option>`;
  select.innerHTML = options;
}

// ======================== ТЕГИ ========================
function renderAllTags() {
  const container = document.getElementById('allTagsList');
  if (!container) return;
  let html = '';
  for (let tag of allTags) {
    html += `<div class="tag-item" style="background-color: ${tag.color}">${escapeHtml(tag.name)}<span class="remove-tag" onclick="deleteTag(${tag.tag_id})">×</span></div>`;
  }
  container.innerHTML = html;
}

function renderModalTags() {
  const container = document.getElementById('modalTagsList');
  if (!container) return;
  let html = '';
  for (let tag of allTags) {
    const isSelected = chosenTagId === tag.tag_id;
    html += `<div class="tag-item ${isSelected ? 'selected' : ''}" style="background-color: ${tag.color}" onclick="toggleTag(${tag.tag_id})">${escapeHtml(tag.name)} ${isSelected ? '✓' : ''}</div>`;
  }
  container.innerHTML = html;
}

function toggleTag(tagId) {
  chosenTagId = chosenTagId === tagId ? null : tagId;
  renderModalTags();
}

async function addNewTagFromModal() {
  const name = document.getElementById('newTagName').value.trim();
  const color = document.getElementById('newTagColor').value;
  if (!name) { alert('Введите название тега'); return; }
  try {
    const result = await apiRequest('/tags', 'POST', { name, color });
    const newTag = { tag_id: result.tag.id, name: result.tag.name, color: result.tag.color };
    allTags.push(newTag);
    renderAllTags();
    renderModalTags();
    document.getElementById('newTagName').value = '';
  } catch (err) {
    alert('Ошибка создания тега: ' + err.message);
  }
}

async function deleteTag(tagId) {
  try {
    await apiRequest(`/tags/${tagId}`, 'DELETE');
    allTags = allTags.filter(t => t.tag_id !== tagId);
    if (chosenTagId === tagId) chosenTagId = null;
    // Перезагружаем задачи (БД установит tag_id = NULL благодаря ON DELETE SET NULL)
    const tasksData = await apiRequest('/tasks', 'GET');
    tasks = tasksData.tasks || [];
    renderAllTags();
    renderKanban();
  } catch (err) {
    alert('Ошибка удаления тега: ' + err.message);
  }
}

// ======================== КАНБАН ========================
function renderKanban() {
  const board = document.getElementById('kanbanBoard');
  if (!board) return;
  board.innerHTML = '';
  
  let filteredTasks = currentProjectId ? tasks.filter(t => t.project_id === currentProjectId) : tasks;
  // Очищаем от undefined
  filteredTasks = filteredTasks.filter(t => t && typeof t === 'object');
  
  for (let status of STATUSES) {
    const columnTasks = filteredTasks.filter(t => t.status === status);
    const column = document.createElement('div');
    column.className = 'kanban-column bg-murkoff-dark rounded-4 p-3';
    column.setAttribute('data-status', status);
    column.addEventListener('dragover', (e) => { e.preventDefault(); column.classList.add('drag-over'); });
    column.addEventListener('dragleave', () => column.classList.remove('drag-over'));
    column.addEventListener('drop', async (e) => {
      e.preventDefault();
      column.classList.remove('drag-over');
      if (dragId !== null) {
        await moveTask(dragId, status);
        dragId = null;
      }
    });
    column.innerHTML = `
      <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom border-success">
        <span class="fw-bold text-white fs-5">${STATUS_NAMES[status]}</span>
        <span class="badge bg-success rounded-pill px-3 py-2">${columnTasks.length}</span>
      </div>
      <div class="task-cards">
        ${columnTasks.map(task => renderTaskCard(task)).join('')}
      </div>
    `;
    board.appendChild(column);
  }
  
  // Добавляем dragstart для карточек
  document.querySelectorAll('.task-card').forEach(card => {
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', (e) => {
      const tid = card.getAttribute('data-task-id');
      dragId = tid ? parseInt(tid) : null;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });
}

function renderTaskCard(task) {
  if (!task) return '';
  let priorityClass = 'priority-low', priorityText = '🟢 Низкий', borderColor = '#4caf50';
  if (task.priority === 'high') { priorityClass = 'priority-high'; priorityText = '🔴 Высокий'; borderColor = '#f44336'; }
  else if (task.priority === 'medium') { priorityClass = 'priority-medium'; priorityText = '🟠 Средний'; borderColor = '#ff9800'; }
  
  let deadlineHtml = task.deadline ? `<div class="small text-danger mt-1">⏰ ${new Date(task.deadline).toLocaleString()}</div>` : '';
  let tagsHtml = '';
  if (task.tag_id) {
    const tag = allTags.find(t => t.tag_id === task.tag_id);
    if (tag) tagsHtml = `<span class="badge me-1" style="background-color: ${tag.color}">${escapeHtml(tag.name)}</span>`;
  }
  const project = projects.find(p => p.project_id === task.project_id);
  const projectName = project ? project.name : 'Без проекта';
  
  return `<div class="task-card card p-3 mb-2" data-task-id="${task.task_id}" style="border-left-color: ${borderColor}">
    <div class="fw-bold">${escapeHtml(task.task_number)}</div>
    <div class="small text-secondary">${escapeHtml(task.description || 'Нет описания')}</div>
    ${deadlineHtml}
    <div class="mt-1"><span class="badge ${priorityClass}">${priorityText}</span></div>
    <div class="mt-1">${tagsHtml}</div>
    <div class="small text-success mt-1">📁 ${escapeHtml(projectName)}</div>
    <div class="mt-2 d-flex gap-2">
      <button class="btn btn-sm btn-primary rounded-pill" onclick="event.stopPropagation(); openEditTaskModal(${task.task_id})">✏️ Править</button>
      <button class="btn btn-sm btn-danger rounded-pill" onclick="event.stopPropagation(); deleteTask(${task.task_id})">🗑️ Удалить</button>
    </div>
  </div>`;
}

async function moveTask(taskId, newStatus) {
  try {
    const result = await apiRequest(`/tasks/${taskId}`, 'PUT', { status: newStatus });
    // Обновляем задачу в локальном массиве
    const updatedTask = result.data?.task;
    if (updatedTask) {
      const index = tasks.findIndex(t => t.task_id === taskId);
      if (index !== -1) tasks[index] = updatedTask;
    }
    renderKanban();
    refreshStats();
  } catch (err) {
    alert('Ошибка перемещения задачи: ' + err.message);
  }
}

// ======================== ЗАДАЧИ (CRUD) ========================
function showAddTask() {
  editingTaskId = null;
  chosenTagId = null;
  document.getElementById('taskModalTitle').textContent = '➕ Новая задача';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDescription').value = '';
  document.getElementById('taskDeadline').value = '';
  document.getElementById('taskPriority').value = 'medium';
  document.getElementById('taskProject').value = '';
  renderModalTags();
  taskModal.show();
}

function openEditTaskModal(taskId) {
  const task = tasks.find(t => t.task_id === taskId);
  if (!task) return;
  editingTaskId = taskId;
  chosenTagId = task.tag_id || null;
  document.getElementById('taskModalTitle').textContent = '✏️ Редактировать задачу';
  document.getElementById('taskTitle').value = task.task_number;
  document.getElementById('taskDescription').value = task.description || '';
  document.getElementById('taskDeadline').value = task.deadline ? task.deadline.slice(0, 16) : '';
  document.getElementById('taskPriority').value = task.priority || 'medium';
  document.getElementById('taskProject').value = task.project_id || '';
  renderModalTags();
  taskModal.show();
}

async function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { alert('Введите название задачи'); return; }
  
  const projectIdRaw = document.getElementById('taskProject').value;
  const project_id = projectIdRaw ? Number(projectIdRaw) : null;
  const deadlineRaw = document.getElementById('taskDeadline').value;
  const deadline = deadlineRaw ? new Date(deadlineRaw).toISOString() : null;
  const priority = document.getElementById('taskPriority').value;
  const description = document.getElementById('taskDescription').value;
  const tag_id = chosenTagId ? Number(chosenTagId) : null;
  
  const taskData = {
    task_number: title,
    description: description,
    deadline: deadline,
    priority: priority,
    project_id: project_id,
    tag_id: tag_id,
    status: editingTaskId ? (tasks.find(t => t.task_id === editingTaskId)?.status || 'todo') : 'todo'
  };
  
  try {
    let result;
    if (editingTaskId) {
      result = await apiRequest(`/tasks/${editingTaskId}`, 'PUT', taskData);
      const updatedTask = result.data?.task;
      if (updatedTask) {
        const index = tasks.findIndex(t => t.task_id === editingTaskId);
        if (index !== -1) tasks[index] = updatedTask;
      }
    } else {
      result = await apiRequest('/tasks', 'POST', taskData);
      const newTask = result.data?.task;
      if (newTask) tasks.push(newTask);
    }
    renderKanban();
    refreshStats();
    taskModal.hide();
  } catch (err) {
    alert('Ошибка сохранения задачи: ' + err.message);
  }
}

async function deleteTask(taskId) {
  if (!confirm('Удалить задачу навсегда?')) return;
  try {
    await apiRequest(`/tasks/${taskId}`, 'DELETE');
    tasks = tasks.filter(t => t.task_id !== taskId);
    renderKanban();
    refreshStats();
  } catch (err) {
    alert('Ошибка удаления задачи: ' + err.message);
  }
}

// ======================== СТАТИСТИКА (ПРОФИЛЬ) ========================
function refreshStats() {
  const active = tasks.filter(t => t.status !== 'done').length;
  const completed = tasks.filter(t => t.status === 'done').length;
  document.getElementById('profileStats').innerHTML = `${active} в работе, ${completed} выполнено`;
  document.getElementById('profileUser').innerText = agent;
}

// ======================== АНАЛИТИКА (FLASK) ========================
async function loadDashboardCharts() {
  try {
    const response = await fetch(`${FLASK_BASE_URL}/dashboard`);
    const result = await response.json();
    if (result.status === 'success') {
      const hoursCtx = document.getElementById('hoursChart').getContext('2d');
      const statusCtx = document.getElementById('statusesChart').getContext('2d');
      if (hoursChart) hoursChart.destroy();
      if (statusesChart) statusesChart.destroy();
      hoursChart = new Chart(hoursCtx, {
        type: 'bar',
        data: {
          labels: result.charts.employee_hours.labels,
          datasets: [{ label: 'Часы', data: result.charts.employee_hours.datasets, backgroundColor: '#4a6741' }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
      });
      statusesChart = new Chart(statusCtx, {
        type: 'pie',
        data: {
          labels: result.charts.task_statuses.labels,
          datasets: [{ data: result.charts.task_statuses.datasets, backgroundColor: ['#4a6741','#f44336','#2196f3','#ffeb3b'] }]
        }
      });
    }
  } catch (err) {
    console.error('Ошибка загрузки графиков:', err);
  }
}

// ======================== ВКЛАДКИ ========================
function switchTab(tabName) {
  document.getElementById('kanbanPage').style.display = tabName === 'kanban' ? 'block' : 'none';
  document.getElementById('profilePage').style.display = tabName === 'profile' ? 'block' : 'none';
  document.getElementById('analyticsPage').style.display = tabName === 'analytics' ? 'block' : 'none';
  if (tabName === 'analytics') loadDashboardCharts();
  if (tabName === 'profile') refreshStats();
}

// ======================== ESCAPE HTML ========================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

// ======================== ИНИЦИАЛИЗАЦИЯ ========================
document.addEventListener('DOMContentLoaded', () => {
  taskModal = new bootstrap.Modal(document.getElementById('taskModal'));
  // Навигация
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active', 'bg-success'));
      this.classList.add('active', 'bg-success');
      switchTab(this.dataset.tab);
    });
  });
  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('authToken');
    localStorage.removeItem('agent');
    window.location.href = 'logboot.html';
  });
  loadData();
});
</script>
